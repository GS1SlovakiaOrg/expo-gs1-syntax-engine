plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.gs1syntaxengine'
version = '0.1.0'

android {
  namespace "expo.modules.gs1syntaxengine"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
  externalNativeBuild {
    cmake {
        path file('src/main/cpp/CMakeLists.txt')
    }
  }
}
